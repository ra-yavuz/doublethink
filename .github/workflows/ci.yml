name: ci

# CI for doublethink (a Go project; no Debian packaging, runs in Docker or native).
#
#   test     go vet + go test -race on push/PR/tags
#   build    build the Docker image on tag (sanity: the production image compiles)
#   release  tag-only: cross-compile static binaries and publish a GitHub Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race ./...

  build-image:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Build production Docker image
        run: docker build -t doublethink:ci -f Dockerfile .

  release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Cross-compile static binaries
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"; arch="${target#*/}"
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            out="dist/doublethink_${VERSION}_${os}_${arch}${ext}"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags=-s -o "$out" ./cmd/doublethink
          done
          ( cd dist && sha256sum doublethink_* > SHA256SUMS )
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/doublethink_*
            dist/SHA256SUMS
          generate_release_notes: true
