name: ci

# CI for doublethink (a Go project; no Debian packaging, runs in Docker or native).
#
#   test     go vet + go test -race on push/PR/tags
#   build    build the Docker image on tag (sanity: the production image compiles)
#   release  tag-only: cross-compile static binaries and publish a GitHub Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race ./...

  build-image:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Build production Docker image
        run: docker build -t doublethink:ci -f Dockerfile .

  release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Cross-compile static binaries
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"; arch="${target#*/}"
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            out="dist/doublethink_${VERSION}_${os}_${arch}${ext}"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags=-s -o "$out" ./cmd/doublethink
          done
          ( cd dist && sha256sum doublethink_* > SHA256SUMS )
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/doublethink_*
            dist/SHA256SUMS
          generate_release_notes: true

  # Build the sideloadable Android client APK and attach it to the same tag release.
  # action-gh-release appends assets to an existing release for the tag, so this job
  # coexists with `release` above. Signed only when the ANDROID_* secrets are set;
  # otherwise it builds an unsigned debug APK so the workflow still proves the app builds.
  android-release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - name: Install pinned SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - name: Build APK
        # All signing inputs come through env (which may reference secrets); the script
        # decides signed-release vs unsigned-debug by whether the keystore secret is set.
        # secrets cannot be used in step `if:`, so the branching lives in bash.
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -eu
          chmod +x ./gradlew
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            export ANDROID_KEYSTORE_PATH="$RUNNER_TEMP/release.jks"
            ./gradlew :app:assembleRelease --no-daemon
            APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          else
            echo "No signing secrets set; building an unsigned debug APK."
            ./gradlew :app:assembleDebug --no-daemon
            APK=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
          fi
          mkdir -p out
          cp "$APK" "out/doublethink-android_${GITHUB_REF_NAME}.apk"
          ( cd out && sha256sum doublethink-android_*.apk > SHA256SUMS-android )
      - name: Attach APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/out/doublethink-android_*.apk
            android/out/SHA256SUMS-android
